server {
    listen 80;
    server_name vocalflow.eurekai.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name vocalflow.eurekai.io;

    ssl_certificate     /etc/letsencrypt/live/vocalflow.eurekai.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vocalflow.eurekai.io/privkey.pem;

    # React frontend
    root /opt/vocal-flow/frontend/dist;
    index index.html;

    # API proxy
    location ~ ^/(auth|recordings|progress|health) {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 50M;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
